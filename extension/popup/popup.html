<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keio Survey Overlay</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Keio Survey Overlay</h1>
        <p>シラバス上に、保存済みの授業評価を表示します。</p>
      </header>

      <section id="readiness-card" class="status-card" aria-label="現在の状態">
        <span>現在の状態</span>
        <h2 id="readiness-title">確認中</h2>
        <p id="readiness-note">保存状況を確認しています。</p>
      </section>

      <dl class="summary-list">
        <div>
          <dt>使える評価</dt>
          <dd id="evaluation-count">-</dd>
        </div>
        <div>
          <dt>コメント付き</dt>
          <dd id="comment-count">-</dd>
        </div>
        <div>
          <dt>最終更新</dt>
          <dd id="last-seen">-</dd>
        </div>
        <div>
          <dt>K-Support</dt>
          <dd id="ksupport-status">-</dd>
        </div>
      </dl>
      <section class="progress-panel" aria-label="同期状況">
        <div class="progress-head">
          <div>
            <h2>保存状況</h2>
            <p id="progress-stage">確認中</p>
          </div>
          <strong id="progress-percent">-</strong>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-note" class="progress-note">K-Support にログインして更新すると、保存できた範囲が表示されます。</p>
        <p id="cache-detail" class="cache-detail">評価 - 件</p>
      </section>
      <p class="privacy-note">授業評価とコメントはこの端末にだけ保存されます。</p>
      <button id="open-ksupport" type="button">K-Supportを開く</button>
      <button id="sync-all" type="button">評価データを更新</button>
      <p id="debug-message" class="debug-message"></p>
    </main>
    <script src="../src/shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
