<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keio Survey Overlay</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Keio Survey Overlay</h1>
      <dl>
        <div>
          <dt>保存済み科目</dt>
          <dd id="course-count">-</dd>
        </div>
        <div>
          <dt>保存済み評価</dt>
          <dd id="evaluation-count">-</dd>
        </div>
        <div>
          <dt>自由記述あり</dt>
          <dd id="comment-count">-</dd>
        </div>
        <div>
          <dt>最終取得</dt>
          <dd id="last-seen">-</dd>
        </div>
        <div>
          <dt>全件同期</dt>
          <dd id="sync-status">-</dd>
        </div>
        <div>
          <dt>同期結果</dt>
          <dd id="sync-count">-</dd>
        </div>
        <div>
          <dt>K-Support</dt>
          <dd id="ksupport-status">-</dd>
        </div>
      </dl>
      <section class="progress-panel" aria-label="同期状況">
        <div class="progress-head">
          <div>
            <h2>同期カバレッジ</h2>
            <p id="progress-stage">未同期</p>
          </div>
          <strong id="progress-percent">0%</strong>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="progress-grid">
          <div>
            <span>慶應全体</span>
            <strong id="expected-total">-</strong>
          </div>
          <div>
            <span>検索確認</span>
            <strong id="search-found">-</strong>
          </div>
          <div>
            <span>詳細取得</span>
            <strong id="detail-progress">-</strong>
          </div>
        </div>
        <p id="progress-note" class="progress-note">全件同期を開始すると進捗が表示されます。</p>
      </section>
      <p>K-Support の授業評価画面を開くと、集計値と自由記述コメントをこの端末だけに保存します。</p>
      <button id="open-ksupport" type="button">K-Supportを開く</button>
      <button id="sync-all" type="button">評価キャッシュを同期</button>
      <p id="debug-message" class="debug-message"></p>
    </main>
    <script src="../src/shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
